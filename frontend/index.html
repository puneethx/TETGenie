<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0"
    />
    <meta name="theme-color" content="#6d28d9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f1a" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="TETGenie — daily AP TET SGT Paper I mock exams in Telugu & English. Practice, score, and become exam-ready."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TETGenie" />
    <title>TETGenie — TET SGT Paper I Mock Exams</title>
    <!-- Prevent a flash of the wrong theme before React mounts -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('tetgenie-theme');
          var theme =
            saved ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
